<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F7FA"/>
      <stop offset="100%" style="stop-color:#E8ECF1"/>
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#165DFF"/>
      <stop offset="100%" style="stop-color:#4D8FFF"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#165DFF" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>

  <!-- 产品展示区域 -->
  <g transform="translate(400, 300)" filter="url(#shadow)">
    <!-- 眼镜主体 -->
    <g>
      <!-- 左镜框 -->
      <ellipse cx="-120" cy="0" rx="80" ry="50" fill="none" stroke="url(#frameGradient)" stroke-width="12"/>
      <!-- 左镜片 -->
      <ellipse cx="-120" cy="0" rx="70" ry="42" fill="#4D8FFF" opacity="0.2"/>

      <!-- 右镜框 -->
      <ellipse cx="120" cy="0" rx="80" ry="50" fill="none" stroke="url(#frameGradient)" stroke-width="12"/>
      <!-- 右镜片 -->
      <ellipse cx="120" cy="0" rx="70" ry="42" fill="#4D8FFF" opacity="0.2"/>

      <!-- 鼻梁 -->
      <path d="M-40 0 Q0 -15 40 0" fill="none" stroke="#165DFF" stroke-width="10"/>

      <!-- 左镜腿 -->
      <path d="M-200 0 L-280 -20 Q-300 -25 -320 -30" fill="none" stroke="#165DFF" stroke-width="8" stroke-linecap="round"/>
      <!-- 左镜腿末端 -->
      <ellipse cx="-320" cy="-30" rx="15" ry="25" fill="#165DFF"/>

      <!-- 右镜腿 -->
      <path d="M200 0 L280 -20 Q300 -25 320 -30" fill="none" stroke="#165DFF" stroke-width="8" stroke-linecap="round"/>
      <!-- 右镜腿末端 -->
      <ellipse cx="320" cy="-30" rx="15" ry="25" fill="#165DFF"/>

      <!-- 鼻托 -->
      <ellipse cx="-55" cy="50" rx="12" ry="8" fill="#165DFF" opacity="0.7"/>
      <ellipse cx="55" cy="50" rx="12" ry="8" fill="#165DFF" opacity="0.7"/>
    </g>

    <!-- 功能标识点 -->
    <g>
      <!-- 除雾功能标识 -->
      <circle cx="-180" cy="-80" r="25" fill="#FF7D00"/>
      <text x="-180" y="-75" text-anchor="middle" fill="white" font-size="20" font-weight="bold">除雾</text>

      <!-- 蓝牙功能标识 -->
      <circle cx="180" cy="-80" r="25" fill="#FF7D00"/>
      <text x="180" y="-75" text-anchor="middle" fill="white" font-size="20" font-weight="bold">蓝牙</text>

      <!-- NFC功能标识 -->
      <circle cx="-250" cy="60" r="25" fill="#FF7D00"/>
      <text x="-250" y="65" text-anchor="middle" fill="white" font-size="16" font-weight="bold">NFC</text>

      <!-- 支付功能标识 -->
      <circle cx="250" cy="60" r="25" fill="#FF7D00"/>
      <text x="250" y="65" text-anchor="middle" fill="white" font-size="16" font-weight="bold">支付</text>
    </g>

    <!-- 镜片反光效果 -->
    <ellipse cx="-100" cy="-15" rx="25" ry="15" fill="white" opacity="0.4" transform="rotate(-20 -100 -15)"/>
    <ellipse cx="140" cy="-15" rx="25" ry="15" fill="white" opacity="0.4" transform="rotate(-20 140 -15)"/>
  </g>

  <!-- 底部产品名称 -->
  <text x="400" y="520" text-anchor="middle" font-size="28" font-weight="bold" fill="#165DFF">灵动视野</text>
  <text x="400" y="555" text-anchor="middle" font-size="16" fill="#666666">智慧型多功能模块化眼镜框</text>
</svg>