<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#165DFF"/>
      <stop offset="100%" style="stop-color:#4D8FFF"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)"/>
  <!-- 眼镜框架 -->
  <g fill="none" stroke="white" stroke-width="8">
    <!-- 左镜框 -->
    <circle cx="65" cy="90" r="28"/>
    <!-- 右镜框 -->
    <circle cx="135" cy="90" r="28"/>
    <!-- 鼻梁 -->
    <path d="M93 90 Q100 85 107 90" stroke-width="6"/>
    <!-- 左镜腿 -->
    <path d="M37 90 L25 85 L25 105 L37 100" stroke-width="5"/>
    <!-- 右镜腿 -->
    <path d="M163 90 L175 85 L175 105 L163 100" stroke-width="5"/>
  </g>
  <!-- 眼镜中的闪光点 -->
  <g fill="white" opacity="0.8">
    <circle cx="55" cy="82" r="4"/>
    <circle cx="125" cy="82" r="4"/>
  </g>
</svg>