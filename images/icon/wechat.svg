<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <pattern id="qrPattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="30" height="30" fill="white"/>
      <rect x="0" y="0" width="14" height="14" fill="#165DFF"/>
      <rect x="16" y="0" width="14" height="14" fill="white"/>
      <rect x="0" y="16" width="14" height="14" fill="white"/>
      <rect x="16" y="16" width="14" height="14" fill="#165DFF"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="300" height="300" fill="#F5F7FA"/>

  <!-- 二维码主体 -->
  <rect x="30" y="30" width="240" height="240" fill="white" rx="10"/>

  <!-- 定位点 - 左上 -->
  <g transform="translate(45, 45)">
    <rect width="60" height="60" fill="#165DFF" rx="5"/>
    <rect x="10" y="10" width="40" height="40" fill="white" rx="3"/>
    <rect x="20" y="20" width="20" height="20" fill="#165DFF" rx="2"/>
  </g>

  <!-- 定位点 - 右上 -->
  <g transform="translate(195, 45)">
    <rect width="60" height="60" fill="#165DFF" rx="5"/>
    <rect x="10" y="10" width="40" height="40" fill="white" rx="3"/>
    <rect x="20" y="20" width="20" height="20" fill="#165DFF" rx="2"/>
  </g>

  <!-- 定位点 - 左下 -->
  <g transform="translate(45, 195)">
    <rect width="60" height="60" fill="#165DFF" rx="5"/>
    <rect x="10" y="10" width="40" height="40" fill="white" rx="3"/>
    <rect x="20" y="20" width="20" height="20" fill="#165DFF" rx="2"/>
  </g>

  <!-- 数据区图案 -->
  <g transform="translate(120, 120)">
    <rect x="10" y="10" width="20" height="20" fill="#165DFF"/>
    <rect x="40" y="10" width="20" height="20" fill="#4D8FFF"/>
    <rect x="70" y="10" width="20" height="20" fill="#165DFF"/>
    <rect x="10" y="40" width="20" height="20" fill="#4D8FFF"/>
    <rect x="40" y="40" width="20" height="20" fill="#165DFF"/>
    <rect x="70" y="40" width="20" height="20" fill="#4D8FFF"/>
    <rect x="10" y="70" width="20" height="20" fill="#165DFF"/>
    <rect x="40" y="70" width="20" height="20" fill="#4D8FFF"/>
    <rect x="70" y="70" width="20" height="20" fill="#165DFF"/>
  </g>

  <!-- 中心Logo -->
  <circle cx="150" cy="150" r="25" fill="white"/>
  <circle cx="150" cy="150" r="20" fill="#165DFF"/>
  <text x="150" y="156" text-anchor="middle" fill="white" font-size="14" font-weight="bold">灵动</text>

  <!-- 底部文字 -->
  <text x="150" y="285" text-anchor="middle" fill="#165DFF" font-size="14" font-weight="bold">扫码了解详情</text>
</svg>